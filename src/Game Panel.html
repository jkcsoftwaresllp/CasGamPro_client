<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasGamPro Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .bordered {
      border: 1px solid #ccc;
      padding: 10px;
    }
    .menu-bar {
      background-color: #a8f85e;
      padding: 10px;
    }
    .card {
      height: 90px;
      width: 60px;
      margin: 10px;
      box-shadow: 5px 5px #888888;
    }
    .card img {
      height: 100%;
      width: 100%;
      border-radius: 5px;
    }
    .player-label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .bet-buttons div {
      margin: 10px 0;
    }
    .bet-buttons a {
      display: inline-block;
      width: 50px;
      height: 50px;
      line-height: 50px;
      border: 2px solid red;
      border-radius: 50%;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: red;
      text-decoration: none;
      background-color: white;
      transition: all 0.3s ease-in-out;
    }
    .bet-buttons a:hover {
      background-color: red;
      color: white;
    }
    .vsh {
      min-height: 325px;
    }
  </style>
</head>
<body>
  <div class="container-fluid" style="margin-bottom: 25px;">
    <!-- Menu Bar -->
    <div class="row menu-bar">
      <div class="col-md-12 d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Teen Patti</h5>
        <button class="btn btn-outline-secondary">Menu</button>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="row mt-3 vsh">
      <!-- Card Details -->
      <div class="col-md-3 bordered">
        <div class="player-label text-center">Player 1</div>
        <div class="d-flex justify-content-center" id="player1-cards">
          <div class="card"><img src="placeholder.png" alt="Card"></div>
          <div class="card"><img src="placeholder.png" alt="Card"></div>
          <div class="card"><img src="placeholder.png" alt="Card"></div>
        </div>
        <div class="player-label text-center mt-3">Player 2</div>
        <div class="d-flex mt-2 justify-content-center" id="player2-cards">
          <div class="card"><img src="placeholder.png" alt="Card"></div>
          <div class="card"><img src="placeholder.png" alt="Card"></div>
          <div class="card"><img src="placeholder.png" alt="Card"></div>
        </div>
      </div>

      <!-- Video/Simulation -->
      <div class="col-md-6 bordered vsh" style="background-color: #dfffe0;">
        <h6 class="text-center">Video/Simulation</h6>
      </div>

      <!-- Right Section -->
      <div class="col-md-3">
        <div class="bordered mb-3">
          <h6>History</h6>
          <button class="btn btn-outline-secondary btn-sm">P1</button>
          <button class="btn btn-outline-secondary btn-sm">P2</button>
          <button class="btn btn-outline-secondary btn-sm">P1</button>
        </div>
        <div class="bordered">
          <h6>Current Stake</h6>
          <p>Details of the current stake will go here.</p>
        </div>
      </div>
    </div>

    <!-- Custom Number Input -->
    <div class="row mt-2">
      <div class="col-md-12 d-flex justify-content-center">
        <div>
          <div class="d-flex align-items-center justify-content-center mb-3">
            <button class="btn btn-outline-secondary" id="decrement" style="width: 40px; height: 40px; font-size: 20px;">-</button>
            <input type="number" id="custom-number-input" class="form-control mx-2 text-center" style="width: 200px; height: 40px;" value="0" min="0" />
            <button class="btn btn-outline-secondary" id="increment" style="width: 40px; height: 40px; font-size: 20px;">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Betting Buttons Section -->
    <div class="row">
      <div class="col-md-12 d-flex justify-content-center bet-buttons">
        <div>
          <a href="#" style="margin: 3px;">10</a>
          <a href="#" style="margin: 3px;">20</a>
          <a href="#" style="margin: 3px;">50</a>
          <a href="#" style="margin: 3px;">100</a>
          <a href="#" style="margin: 3px;">500</a>
          <a href="#" style="margin: 3px;">1K</a>
          <a href="#" style="margin: 3px;">5K</a>
          <a href="#" style="margin: 3px;">10K</a>
          <a href="#" style="margin: 3px;">100K</a>
          <a href="#" style="margin: 3px;">500K</a>
        </div>
      </div>
    </div>

    <!-- Players Section -->
    <div class="row">
      <div class="col-md-6 text-center mt-3">
        <button class="btn btn-success w-100">Player-1 (1.96)</button>
      </div>
      <div class="col-md-6 text-center mt-3">
        <button class="btn btn-success w-100">Player-2 (1.96)</button>
      </div>
    </div>
  </div>

  <script>
    async function fetchCards() {
      try {
        const response = await fetch('https://deckofcardsapi.com/api/deck/new/shuffle/?deck_count=1');
        const data = await response.json();
        const deckId = data.deck_id;

        const drawResponse = await fetch(`https://deckofcardsapi.com/api/deck/${deckId}/draw/?count=6`);
        const cardsData = await drawResponse.json();

        const player1Cards = cardsData.cards.slice(0, 3);
        const player2Cards = cardsData.cards.slice(3);

        document.getElementById('player1-cards').innerHTML = player1Cards.map(card => `
          <div class="card"><img src="${card.image}" alt="${card.code}"></div>
        `).join('');

        document.getElementById('player2-cards').innerHTML = player2Cards.map(card => `
          <div class="card"><img src="${card.image}" alt="${card.code}"></div>
        `).join('');
      } catch (error) {
        console.error('Error fetching cards:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', fetchCards);

    document.getElementById('decrement').addEventListener('click', () => {
      const input = document.getElementById('custom-number-input');
      input.value = Math.max(0, parseInt(input.value) - 1 || 0);
    });

    document.getElementById('increment').addEventListener('click', () => {
      const input = document.getElementById('custom-number-input');
      input.value = (parseInt(input.value) || 0) + 1;
    });
  </script>
</body>
</html>
