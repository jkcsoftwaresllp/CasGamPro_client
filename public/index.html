<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
  
    <style>
      .bordered {
        border: 1px solid #ccc;
        padding: 10px;
      }
      .menu-bar {
        background-color: #ccceca;
        padding: 10px;
      }
      .card {
        height: 90px;
        width: 60px;
        margin: 10px;
        box-shadow: 5px 5px #888888;
      }
      .card img {
        height: 100%;
        width: 100%;
        border-radius: 5px;
      }
      .player-label {
        font-weight: bold;
        margin-bottom: 5px;
      }
      .bet-buttons div {
        margin: 10px 0;
      }
      .bet-buttons a {
        display: inline-block;
        width: 50px;
        height: 50px;
        line-height: 50px;
        border: 2px solid red;
        border-radius: 50%;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: red;
        text-decoration: none;
        background-color: white;
        transition: all 0.3s ease-in-out;
      }
      .bet-buttons a:hover {
        background-color: red;
        color: white;
      }
      .vsh {
        min-height: 325px;
      }
    </style>
  
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>


  <script>
    async function fetchCards() {
      try {
        const response = await fetch('https://deckofcardsapi.com/api/deck/new/shuffle/?deck_count=1');
        const data = await response.json();
        const deckId = data.deck_id;

        const drawResponse = await fetch(`https://deckofcardsapi.com/api/deck/${deckId}/draw/?count=6`);
        const cardsData = await drawResponse.json();

        const player1Cards = cardsData.cards.slice(0, 3);
        const player2Cards = cardsData.cards.slice(3);

        document.getElementById('player1-cards').innerHTML = player1Cards.map(card => `
          <div class="card"><img src="${card.image}" alt="${card.code}"></div>
        `).join('');

        document.getElementById('player2-cards').innerHTML = player2Cards.map(card => `
          <div class="card"><img src="${card.image}" alt="${card.code}"></div>
        `).join('');
      } catch (error) {
        console.error('Error fetching cards:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', fetchCards);

    document.getElementById('decrement').addEventListener('click', () => {
      const input = document.getElementById('custom-number-input');
      input.value = Math.max(0, parseInt(input.value) - 1 || 0);
    });

    document.getElementById('increment').addEventListener('click', () => {
      const input = document.getElementById('custom-number-input');
      input.value = (parseInt(input.value) || 0) + 1;
    });
  </script>

</html>
